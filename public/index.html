<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Feedback System - Submit Your Feedback</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8 px-4">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">📋 Smart Feedback System</h1>
      <p class="text-gray-600 text-lg">We value your feedback. Please share your experience with us!</p>
    </div>

    <!-- Feedback Form -->
    <div class="bg-white rounded-lg shadow-xl p-8 mb-6">
      <form id="feedbackForm" class="space-y-6">
        <!-- Name Field -->
        <div>
          <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">
            👤 Full Name <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            required
          />
          <span class="error-message text-red-500 text-sm mt-1 hidden"></span>
        </div>

        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
            📧 Email Address <span class="text-red-500">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            required
          />
          <span class="error-message text-red-500 text-sm mt-1 hidden"></span>
        </div>

        <!-- Event Name Field -->
        <div>
          <label for="eventName" class="block text-sm font-semibold text-gray-700 mb-2">
            🎪 Event Name <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="eventName"
            name="eventName"
            placeholder="Which event are you providing feedback for?"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            required
          />
          <span class="error-message text-red-500 text-sm mt-1 hidden"></span>
        </div>

        <!-- Rating Field -->
        <div>
          <label for="rating" class="block text-sm font-semibold text-gray-700 mb-2">
            ⭐ Rating (1-5 stars) <span class="text-red-500">*</span>
          </label>
          <div class="flex gap-2 items-center">
            <select
              id="rating"
              name="rating"
              class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              required
            >
              <option value="">Select a rating</option>
              <option value="1">⭐ 1 - Poor</option>
              <option value="2">⭐⭐ 2 - Fair</option>
              <option value="3">⭐⭐⭐ 3 - Good</option>
              <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
              <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
            </select>
          </div>
          <span class="error-message text-red-500 text-sm mt-1 hidden"></span>
        </div>

        <!-- Feedback Message Field -->
        <div>
          <label for="feedbackMessage" class="block text-sm font-semibold text-gray-700 mb-2">
            💬 Your Feedback Message <span class="text-red-500">*</span>
          </label>
          <textarea
            id="feedbackMessage"
            name="feedbackMessage"
            placeholder="Please share your detailed feedback (minimum 10 characters)"
            rows="6"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition resize-none"
            required
          ></textarea>
          <div class="flex justify-between mt-2">
            <span class="error-message text-red-500 text-sm"></span>
            <span class="char-count text-gray-500 text-sm">0 / 1000</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 flex items-center justify-center gap-2"
        >
          <span class="submit-text">📤 Submit Feedback</span>
          <span class="loading-spinner hidden">
            <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
        </button>
      </form>

      <!-- Success Message -->
      <div id="successMessage" class="mt-6 hidden">
        <div class="bg-green-50 border border-green-200 text-green-800 px-6 py-4 rounded-lg">
          <div class="flex items-center gap-3">
            <span class="text-2xl">✅</span>
            <div>
              <p class="font-semibold">Thank you for your feedback!</p>
              <p class="text-sm text-green-700">A confirmation email has been sent to your inbox.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Error Message -->
      <div id="errorMessage" class="mt-6 hidden">
        <div class="bg-red-50 border border-red-200 text-red-800 px-6 py-4 rounded-lg">
          <div class="flex items-center gap-3">
            <span class="text-2xl">❌</span>
            <div>
              <p class="font-semibold">Submission Error</p>
              <p class="text-sm text-red-700" id="errorText"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer Links -->
    <div class="text-center">
      <p class="text-gray-600">
        Are you an admin? <a href="/admin" class="text-blue-600 hover:text-blue-800 font-semibold">View Admin Dashboard</a>
      </p>
    </div>
  </div>

  <script src="/js/form.js"></script>
</body>
</html>
